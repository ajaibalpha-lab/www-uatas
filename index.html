<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Loading...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        /* Container gambar full screen */
        .splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.ibb.co.com/772R7TC/Screenshot-20260401-043035-UATAS.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Overlay gelap opsional agar teks loading lebih terbaca */
        .overlay {
            background: rgba(0,0,0,0.4);
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(1px);
        }

        /* Teks loading */
        .loading-text {
            color: #ff6b6b;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
            margin-top: 20px;
            text-shadow: 0 0 5px rgba(255, 107, 107, 0.5);
        }

        /* Animasi titik-titik */
        .dots::after {
            content: '';
            animation: dots 1.5s steps(3, end) infinite;
        }

        @keyframes dots {
            0%, 20% { content: ''; }
            40% { content: '.'; }
            60% { content: '..'; }
            80%, 100% { content: '...'; }
        }

        /* Spinner loader */
        .spinner {
            width: 50px;
            height: 50px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 5px solid #ff6b6b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="splash">
        <div class="overlay">
            <div class="spinner"></div>
            <div class="loading-text">Memuat<span class="dots"></span></div>
        </div>
    </div>

    <script>
        // Setelah 3 detik, pindah ke halaman verifikasi
        setTimeout(() => {
            window.location.href = "halaman_login_cobaan.html"; // ganti dengan nama file verifikasi Anda
        }, 3000);
    </script>
</body>
</html>
